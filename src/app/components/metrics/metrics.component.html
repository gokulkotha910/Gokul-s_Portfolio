<div class="metrics-section">
  <div class="metrics-overlay"></div>
  <div class="container position-relative">
    <div class="row text-center justify-content-center">

      <!-- Years Experience -->
      <div class="col-6 col-md-3 metric-item">
        <div class="metric-value">
          {{yearsExperience}}
          <span class="blue-plus">+</span>
        </div>

        <div class="metric-label">
          Years Experience
        </div>
      </div>

      <!-- Enterprise Modules -->
      <div class="col-6 col-md-3 metric-item">
        <div class="metric-value">
          {{enterpriseModules}}
          <span class="indigo-plus">+</span>
        </div>

        <div class="metric-label">
          Enterprise Modules
        </div>
      </div>

      <!-- Features Delivered -->
      <div class="col-6 col-md-3 metric-item">
        <div class="metric-value">
          {{featuresDelivered}}
          <span class="purple-plus">+</span>
        </div>

        <div class="metric-label">
          Features Delivered
        </div>
      </div>

      <!-- Industry Domains -->
      <div class="col-6 col-md-3 metric-item">
        <div class="metric-value">
          {{industryDomains}}
          <span class="cyan-plus">+</span>
        </div>
        <div class="metric-label">
          Industry Domains
        </div>
      </div>
    </div>
  </div>
</div>
