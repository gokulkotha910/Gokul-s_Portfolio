<div class="py-24 border-y border-white/5 bg-white/5 relative overflow-hidden -mx-4 sm:-mx-6 md:-mx-12 lg:-mx-24 px-4 sm:px-6 md:px-12 lg:px-24">
  <div class="absolute inset-0 bg-accent-gradient opacity-[0.03] blur-[100px]"></div>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-12 md:gap-4 relative z-10 text-center max-w-7xl mx-auto">
    
    <div class="flex flex-col items-center">
      <div class="text-5xl md:text-7xl font-bold tracking-tighter text-white mb-3">
        {{yearsExperience}}<span class="text-blue-500">+</span>
      </div>
      <div class="text-xs md:text-sm text-text-secondary uppercase tracking-[0.2em] font-semibold">Years Experience</div>
    </div>

    <div class="flex flex-col items-center">
      <div class="text-5xl md:text-7xl font-bold tracking-tighter text-white mb-3">
        {{enterpriseModules}}<span class="text-indigo-500">+</span>
      </div>
      <div class="text-xs md:text-sm text-text-secondary uppercase tracking-[0.2em] font-semibold">Enterprise Modules</div>
    </div>

    <div class="flex flex-col items-center">
      <div class="text-5xl md:text-7xl font-bold tracking-tighter text-white mb-3">
        {{featuresDelivered}}<span class="text-purple-500">+</span>
      </div>
      <div class="text-xs md:text-sm text-text-secondary uppercase tracking-[0.2em] font-semibold">Features Delivered</div>
    </div>

    <div class="flex flex-col items-center">
      <div class="text-5xl md:text-7xl font-bold tracking-tighter text-white mb-3">
        {{industryDomains}}<span class="text-cyan-500">+</span>
      </div>
      <div class="text-xs md:text-sm text-text-secondary uppercase tracking-[0.2em] font-semibold">Industry Domains</div>
    </div>

  </div>
</div>
