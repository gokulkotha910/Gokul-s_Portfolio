<div class="skills-section container">

  <div class="section-header mb-5">
    <h2 class="section-title">Technical Arsenal</h2>
    <div class="title-line"></div>
  </div>

  <div class="row g-4">
    <div class="col-md-6 col-lg-4" *ngFor="let category of skillCategories">
      <div class="skill-card">

        <!-- Glow Effect -->
        <div class="card-glow" [ngClass]="{
            'glow-red': category.color === 'red',
            'glow-blue': category.color === 'blue',
            'glow-green': category.color === 'emerald',
            'glow-orange': category.color === 'orange',
            'glow-slate': category.color === 'slate'
          }">
        </div>

        <!-- Header -->
        <div class="skill-header">
          <div class="skill-icon" [ngClass]="{
              'icon-red': category.color === 'red',
              'icon-blue': category.color === 'blue',
              'icon-green': category.color === 'emerald',
              'icon-orange': category.color === 'orange',
              'icon-slate': category.color === 'slate'
            }">
            <i class="fas fa-bolt"></i>
          </div>

          <h3>
            {{ category.title }}
          </h3>
        </div>

        <!-- Skills -->
        <div class="skills-wrapper">
          <span *ngFor="let skill of category.skills" class="skill-badge">
            {{ skill }}
          </span>
        </div>

      </div>
    </div>
  </div>
</div>
