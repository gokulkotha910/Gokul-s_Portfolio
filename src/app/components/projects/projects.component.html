<div class="projects-section container">

  <div class="section-header mb-5">
    <h2 class="section-title">Featured Projects</h2>
    <div class="title-line"></div>
  </div>

  <div class="row g-4">
    <div *ngFor="let project of projects; let i = index" class="col-md-6 col-lg-4">
      <div class="project-card h-100" (click)="openProjectModal(project)">
        <div class="card-content">

          <div class="project-type" [ngClass]="{
              'type-blue': project.color === 'blue',
              'type-green': project.color === 'emerald',
              'type-amber': project.color === 'amber',
              'type-purple': project.color === 'purple',
              'type-red': project.color === 'red'
            }">
            {{ project.type }}
          </div>

          <h3 class="project-title">
            {{ project.name }}
          </h3>

          <p class="project-description">
            {{ project.overview }}
          </p>

        </div>

        <div class="project-footer">
          <div class="tech-stack">
            <span *ngFor="let tech of project.techStack" class="tech-badge">
              {{ tech }}
            </span>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
