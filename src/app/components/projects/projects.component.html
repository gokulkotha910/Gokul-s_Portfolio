<div class="py-24 max-w-7xl mx-auto w-full">
  <div class="mb-20">
    <h2 class="text-[52px] font-bold tracking-tight mb-4">Featured Projects</h2>
    <div class="h-1 w-24 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full"></div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
  <div *ngFor="let project of projects; let i = index" 
       data-aos="fade-up"
       [attr.data-aos-delay]="i * 100"
       class="glass-card p-8 flex flex-col group cursor-pointer hover:-translate-y-2 transition-all duration-300" 
       (click)="openProjectModal(project)">
      
      <div class="mb-6 flex-grow">
        <div class="text-xs font-bold tracking-widest uppercase mb-3"
             [ngClass]="{
               'text-blue-500': project.color === 'blue',
               'text-emerald-500': project.color === 'emerald',
               'text-amber-500': project.color === 'amber',
               'text-purple-500': project.color === 'purple',
               'text-red-500': project.color === 'red'
             }">{{project.type}}</div>
        <h3 class="text-2xl font-bold text-white mb-4 group-hover:text-blue-400 transition-colors">{{project.name}}</h3>
        <p class="text-text-secondary text-sm leading-relaxed">{{project.overview}}</p>
      </div>

      <div class="mt-auto pt-6 border-t border-white/10">
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let tech of project.techStack" class="text-xs font-medium text-text-secondary bg-white/5 px-2 py-1 rounded">
            {{tech}}
          </span>
        </div>
      </div>
      
    </div>
  </div>
</div>
