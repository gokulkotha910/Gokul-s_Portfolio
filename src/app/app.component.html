<!-- Custom Cursor -->
<div class="custom-cursor d-none d-md-block"
  [style.transform]="'translate(' + (mouseX - 16) + 'px, ' + (mouseY - 16) + 'px)'">
</div>

<!-- Background Grid -->
<div class="background-grid"></div>

<!-- Animated Background Blobs -->
<div class="background-orbs">
  <div class="orb orb-blue"></div>
  <div class="orb orb-purple"></div>
  <div class="orb orb-indigo"></div>
</div>

<!-- Navigation -->
<app-navigation></app-navigation>

<!-- Main Content -->
<main class="main-content">

  <section id="home">
    <app-hero></app-hero>
  </section>

  <section id="metrics">
    <app-metrics></app-metrics>
  </section>

  <section id="about">
    <app-about></app-about>
  </section>

  <section id="experience">
    <app-experience></app-experience>
  </section>

  <section id="architecture">
    <app-architecture></app-architecture>
  </section>

  <section id="projects">
    <app-projects></app-projects>
  </section>

  <section id="skills">
    <app-skills></app-skills>
  </section>

  <section id="contact">
    <app-contact></app-contact>
  </section>

</main>

<!-- Footer -->
<footer class="portfolio-footer">
  <div class="container">
    <div class="row align-items-center gy-4">

      <!-- Copyright -->
      <div class="col-lg-4 text-center text-lg-start">
        <div class="footer-text">
          © 2026 K.V.V.P Gokul.
          Enterprise Frontend Architecture.
        </div>
      </div>

      <!-- Social Links -->
      <div class="col-lg-4 text-center">
        <div class="footer-links">
          <a href="https://github.com/gokulkotha910" target="_blank">
            GitHub
          </a>

          <a href="https://linkedin.com/in/k-v-v-p-gokul-890" target="_blank">
            LinkedIn
          </a>

          <a href="mailto:kothagokul910@gmail.com">
            Contact via Email
          </a>
        </div>

      </div>

      <!-- Scroll Top -->
      <div class="col-lg-4 text-center text-lg-end">

        <button class="scroll-top-btn" (click)="scrollToTop()">

          <i class="fas fa-arrow-up"></i>

        </button>

      </div>

    </div>

  </div>

</footer>
