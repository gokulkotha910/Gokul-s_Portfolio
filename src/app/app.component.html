<!-- Glowing Custom Cursor -->
<div class="pointer-events-none fixed top-0 left-0 w-8 h-8 rounded-full border border-blue-500/50 transition-all duration-75 ease-out z-[9999] shadow-[0_0_20px_rgba(59,130,246,0.5)] bg-blue-500/10 hidden md:block"
     [style.transform]="'translate(' + (mouseX - 16) + 'px, ' + (mouseY - 16) + 'px)'"></div>

<!-- Background Grid Pattern -->
<div class="fixed inset-0 w-full h-full bg-grid-pattern z-[-1] pointer-events-none"></div>

<!-- Ambient Animated Glowing Orbs -->
<div class="fixed inset-0 w-full h-full overflow-hidden z-[-2] pointer-events-none">
  <div class="absolute top-1/4 left-1/4 w-[40vw] h-[40vw] bg-blue-500/10 rounded-full filter blur-[120px] animate-blob"></div>
  <div class="absolute top-1/3 right-1/4 w-[40vw] h-[40vw] bg-purple-500/10 rounded-full filter blur-[120px] animate-blob animation-delay-2000"></div>
  <div class="absolute bottom-1/4 left-1/3 w-[40vw] h-[40vw] bg-indigo-500/10 rounded-full filter blur-[120px] animate-blob animation-delay-4000"></div>
</div>

<app-navigation></app-navigation>

<main class="w-full min-h-screen overflow-x-hidden flex flex-col pt-24 px-4 sm:px-6 md:px-12 lg:px-24 pb-0 gap-32 relative z-10">
  <section id="home"><app-hero></app-hero></section>
  <section id="metrics"><app-metrics></app-metrics></section>
  <section id="about"><app-about></app-about></section>
  <section id="experience"><app-experience></app-experience></section>
  <section id="architecture"><app-architecture></app-architecture></section>
  <section id="projects"><app-projects></app-projects></section>
  <section id="skills"><app-skills></app-skills></section>
  <section id="contact"><app-contact></app-contact></section>
</main>
